<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting - Football Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">Football Analytics Platform</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/xg/">xG Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" href="/scouting/" class="nav-link active">Scouting</a></li>
                    <li class="nav-item"><a class="nav-link" href="/compare/">Comparar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">Sistema de Scouting</h1>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-success text-white">Filtros de Búsqueda</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-2">
                                <label>Edad Mínima</label>
                                <input type="number" class="form-control" id="minAge" placeholder="Ej: 18">
                            </div>
                            <div class="col-md-2">
                                <label>Edad Máxima</label>
                                <input type="number" class="form-control" id="maxAge" placeholder="Ej: 25">
                            </div>
                            <div class="col-md-2">
                                <label>Goles Mínimos</label>
                                <input type="number" class="form-control" id="minGoals" placeholder="Ej: 5">
                            </div>
                            <div class="col-md-2">
                                <label>Asistencias Mínimas</label>
                                <input type="number" class="form-control" id="minAssists" placeholder="Ej: 3">
                            </div>
                            <div class="col-md-2">
                                <label>xG Mínimo</label>
                                <input type="number" class="form-control" id="minXg" placeholder="Ej: 2">
                            </div>
                            <div class="col-md-2">
                                <label>Posición</label>
                                <select class="form-select" id="position">
                                    <option value="">Todas</option>
                                    <option value="forward">Delantero</option>
                                    <option value="midfielder">Centrocampista</option>
                                    <option value="defender">Defensa</option>
                                    <option value="goalkeeper">Portero</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-12">
                                <button class="btn btn-success" onclick="searchPlayers()">Buscar Jugadores</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-success text-white">Resultados del Scouting</div>
                    <div class="card-body">
                        <table class="table table-striped" id="scoutingTable">
                            <thead>
                                <tr>
                                    <th>Jugador</th>
                                    <th>Equipo</th>
                                    <th>Edad</th>
                                    <th>Posición</th>
                                    <th>Goles</th>
                                    <th>Asistencias</th>
                                    <th>xG</th>
                                    <th>Impact Score</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="scoutingBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/scouting.js"></script>
</body>
</html>
