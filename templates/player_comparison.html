<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Jugadores - Football Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">Football Analytics Platform</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/xg/">xG Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" href="/scouting/">Scouting</a></li>
                    <li class="nav-item"><a class="nav-link" href="/compare/" class="nav-link active">Comparar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">Comparador de Jugadores</h1>

        <div class="row mb-4">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-primary text-white">Jugador 1</div>
                    <div class="card-body">
                        <select class="form-select" id="player1Select">
                            <option value="">Seleccionar jugador</option>
                        </select>
                        <div class="mt-3" id="player1Stats"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-2 d-flex align-items-center justify-content-center">
                <h2>VS</h2>
            </div>
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-danger text-white">Jugador 2</div>
                    <div class="card-body">
                        <select class="form-select" id="player2Select">
                            <option value="">Seleccionar jugador</option>
                        </select>
                        <div class="mt-3" id="player2Stats"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-12">
                <button class="btn btn-success w-100" onclick="comparePlayers()">Comparar</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">Gráfico Radar</div>
                    <div class="card-body">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">Comparación Detallada</div>
                    <div class="card-body">
                        <canvas id="comparisonChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-success text-white">Análisis Comparativo</div>
                    <div class="card-body">
                        <div id="comparisonAnalysis"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/player_comparison.js"></script>
</body>
</html>
