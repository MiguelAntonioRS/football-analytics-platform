<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación - Football Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">Football Analytics</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/standings/">Clasificación</a></li>
            </ul>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">📊 Tabla de Clasificación Premier League</h1>
        
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-striped mb-0" id="standingsTable">
                    <thead class="table-success">
                        <tr>
                            <th>Pos</th>
                            <th>Equipo</th>
                            <th>PJ</th>
                            <th>G</th>
                            <th>E</th>
                            <th>P</th>
                            <th>GF</th>
                            <th>GC</th>
                            <th>DG</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody id="standingsBody">
                        <tr><td colspan="10" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Líder</div>
                    <div class="card-body text-center">
                        <h2 class="text-success">🏆</h2>
                        <h5 id="leader">Cargando...</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Máximo Goleador</div>
                    <div class="card-body text-center">
                        <h2 class="text-warning">⚽</h2>
                        <h5 id="topScorer">Cargando...</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Partidos Jugados</div>
                    <div class="card-body text-center">
                        <h2 class="text-info">📅</h2>
                        <h5 id="matchesPlayed">Cargando...</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/standings.js"></script>
</body>
</html>
