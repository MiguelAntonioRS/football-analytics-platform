<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tácticas - Football Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">⚽ Football Analytics</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tactics/">Tácticas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/trends/">Tendencias</a></li>
                </ul>
                <ul class="navbar-nav">
                    <button class="btn theme-toggle" id="themeToggle" title="Cambiar tema">
                        <span id="themeIcon">🌙</span>
                    </button>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">📊 Análisis Táctico</h1>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Selección</div>
                    <div class="card-body">
                        <label>Partido</label>
                        <select class="form-select mb-3" id="matchSelect">
                            <option value="">Seleccionar partido</option>
                        </select>
                        <label>Equipo</label>
                        <select class="form-select mb-3" id="teamSelect">
                            <option value="">Seleccionar equipo</option>
                        </select>
                        <button class="btn btn-success w-100" onclick="loadTacticalData()">Analizar</button>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">Mapa de Calor - Jugadores</div>
                    <div class="card-body">
                        <div id="heatMap" style="height: 400px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Formación Detectada</div>
                    <div class="card-body">
                        <canvas id="formationChart"></canvas>
                        <div id="formationInfo" class="mt-3"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Zonas de Juego</div>
                    <div class="card-body">
                        <canvas id="zonesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">Estadísticas Tácticas Detalladas</div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table" id="tacticsTable">
                                <thead>
                                    <tr>
                                        <th>Métrica</th>
                                        <th>Local</th>
                                        <th>Visitante</th>
                                        <th>Diferencia</th>
                                    </tr>
                                </thead>
                                <tbody id="tacticsBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/tactics.js"></script>
</body>
</html>
